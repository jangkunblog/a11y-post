name: Create Post PR From Keyword
run-name: "Create post PR: ${{ inputs.topic }}"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "포스팅 주제"
        required: true
        type: string

jobs:
  create-post-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate post draft from keyword
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          npm run post:generate -- \
            --keyword "${{ inputs.topic }}" \
            --featured "false" \
            --draft "false"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/post-${{ github.run_id }}
          commit-message: "docs: draft post for '${{ inputs.topic }}'"
          title: "docs: 키워드 '${{ inputs.topic }}' 포스트 초안"
          body: |
            ## 자동 생성된 포스트 초안

            - Topic: `${{ inputs.topic }}`
            - File: `${{ steps.generate.outputs.post_path }}`
            - Slug: `${{ steps.generate.outputs.post_slug }}`
            - Source: `${{ steps.generate.outputs.post_source }}`

            ## 리뷰 체크리스트

            - [ ] 사실 검증
            - [ ] 문체/브랜드 톤 정리
            - [ ] SEO 메타(description, tags) 점검
            - [ ] draft/featured 설정 확인
          labels: |
            content
            auto-generated
          delete-branch: true
