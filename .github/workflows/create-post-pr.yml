name: Create Post PR From Keyword

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "포스트 생성 키워드"
        required: true
        type: string
      featured:
        description: "Featured 섹션에 노출"
        required: true
        default: false
        type: boolean
      draft:
        description: "Draft 상태로 생성"
        required: true
        default: true
        type: boolean

jobs:
  create-post-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate post draft from keyword
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          npm run post:generate -- \
            --keyword "${{ inputs.keyword }}" \
            --featured "${{ inputs.featured }}" \
            --draft "${{ inputs.draft }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/post-${{ github.run_id }}
          commit-message: "docs: draft post for '${{ inputs.keyword }}'"
          title: "docs: 키워드 '${{ inputs.keyword }}' 포스트 초안"
          body: |
            ## 자동 생성된 포스트 초안

            - Keyword: `${{ inputs.keyword }}`
            - File: `${{ steps.generate.outputs.post_path }}`
            - Slug: `${{ steps.generate.outputs.post_slug }}`
            - Source: `${{ steps.generate.outputs.post_source }}`

            ## 리뷰 체크리스트

            - [ ] 사실 검증
            - [ ] 문체/브랜드 톤 정리
            - [ ] SEO 메타(description, tags) 점검
            - [ ] draft/featured 설정 확인
          labels: |
            content
            auto-generated
          delete-branch: true
